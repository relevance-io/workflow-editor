<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Diagram Editor</title>
    <link rel="stylesheet" href="./index.css" />
    <style></style>
  </head>
  <body>
    <script type="module" src="./index.ts"></script>
    <script type="module">
      // =============================================================
      // Bootstrap — create the editor and add demo nodes
      // =============================================================

      import { DiagramEditor, DiagramNode, RectangleNode, EllipseNode } from "./index.ts";

      (async () => {
        const editor = new DiagramEditor();
        editor.registerBuiltInNodes();

        const ICON_UNDONE = "https://upload.wikimedia.org/wikipedia/commons/5/57/Check_mark_%28blue%29.svg";
        const ICON_DONE = "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Eo_circle_green_checkmark.svg/960px-Eo_circle_green_checkmark.svg.png?_=20200417132424";

        const TaskNode = DiagramNode.define(
          RectangleNode,
          { label: "New Task", backgroundColor: "#f0f8ff", imageUrl: ICON_UNDONE, imageWidth: 20, imageHeight: 20 },
          {
            assignee: { label: "Assignee", type: "text", default: "" },
            effort: { label: "Effort", type: "number", default: 1, min: 1, max: 10 },
            done: { label: "Done", type: "boolean", default: false },
            mode: {
              label: "Mode",
              type: "choice",
              default: "auto",
              choices: { auto: "Automatic", manual: "Manual" },
            },
            note: { label: "Note", type: "textarea", default: "" },
            accent: { label: "Accent", type: "color", default: "#3498db" },
          },
          (node) => {
            const done = node.getCustomProperty("done");
            node.backgroundColor = done ? "#d4edda" : "#f0f8ff";
            node.borderColor = done ? "#28a745" : "#adb5bd";
            node.imageUrl = done ? ICON_DONE : ICON_UNDONE;
          },
          ["label", "description"],
        );

        editor.registerNodeType("Task", TaskNode);

        const start = await editor.addNode(new EllipseNode({ label: "START" }));
        const process = await editor.addNode(new RectangleNode({ label: "PROCESS" }));
        const task = await editor.addNode(new TaskNode({ label: "My Task", assignee: "Alice", effort: 3 }));

        start.connectTo(process);
        process.connectTo(task);
        task.connectTo(start);
        task.setCustomProperty("done", true);

        editor.render(document.body);
      })();
    </script>
  </body>
</html>
