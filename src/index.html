<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Diagram Editor</title>
    <link rel="stylesheet" href="./index.css" />
    <style></style>
  </head>
  <body>
    <script type="module" src="./index.ts"></script>
    <script type="module">
      // =============================================================
      // Bootstrap — create the editor and add demo nodes
      // =============================================================

      import { DiagramEditor, DiagramNode, RectangleNode, EllipseNode } from "./index.ts";

      const editor = new DiagramEditor();
      window.editor = editor;

      (async () => {
        editor.registerBuiltInNodes();

        const ICON_UNDONE = "https://upload.wikimedia.org/wikipedia/commons/5/57/Check_mark_%28blue%29.svg";
        const ICON_DONE = "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Eo_circle_green_checkmark.svg/960px-Eo_circle_green_checkmark.svg.png?_=20200417132424";

        const taskColor = (node) => {
          const done = node.getCustomProperty("done");
          const effort = node.getCustomProperty("effort");

          if (done) {
            node.backgroundColor = "#d4edda";
            node.borderColor = "#28a745";
            node.imageUrl = ICON_DONE;
            return;
          } else {
            node.imageUrl = ICON_UNDONE;
          }

          switch (effort) {
            case 1:
              node.backgroundColor = "#E1F5FE";
              node.borderColor = "#03A9F4";
              break;
            case 2:
              node.backgroundColor = "#E8EAF6";
              node.borderColor = "#3F51B5";
              break;
            case 3:
              node.backgroundColor = "#FFF9C4";
              node.borderColor = "#FBC02D";
              break;
            case 4:
              node.backgroundColor = "#FFE0B2";
              node.borderColor = "#FB8C00";
              break;
            case 5:
              node.backgroundColor = "#FFEBEE";
              node.borderColor = "#E53935";
              break;
          }
        };

        const TaskNode = DiagramNode.define(RectangleNode, {
          defaults: {
            label: "New Task",
            backgroundColor: "#f0f8ff",
            imageUrl: ICON_UNDONE,
            imageWidth: 20,
            imageHeight: 20,
          },
          onKeyUp: (node, key) => {
            if (key === " ") {
              node.setCustomProperty("done", !node.getCustomProperty("done"));
            }
          },
          schema: {
            summary: {
              label: "Summary",
              type: "text",
              default: "",
              onChange: (node, val) => {
                node.label = val;
              },
            },
            assignee: {
              label: "Assignee",
              type: "text",
              default: "",
              onChange: (node, val) => {
                node.description = val ? `@${val}` : "";
              },
            },
            effort: {
              label: "Effort",
              type: "number",
              default: 1,
              min: 1,
              max: 5,
              onChange: taskColor,
            },
            done: {
              label: "Done",
              type: "boolean",
              default: false,
              onChange: taskColor,
            },
            mode: {
              label: "Mode",
              type: "choice",
              default: "auto",
              choices: { auto: "Automatic", manual: "Manual" },
            },
            note: { label: "Note", type: "textarea", default: "" },
          },
          visibleProps: [],
          editProp: "summary",
        });

        editor.registerNodeType("Task", TaskNode);

        const start = await editor.addNode(new EllipseNode({ label: "START" }));
        const process = await editor.addNode(new RectangleNode({ label: "PROCESS" }));
        const task1 = await editor.addNode(new TaskNode({ summary: "My Task", assignee: "Alice", effort: 3 }));
        const task2 = await editor.addNode(new TaskNode({ summary: "My Task", assignee: "John", effort: 4 }));

        start.connectTo(process);
        process.connectTo(task1);
        task1.setCustomProperty("done", true);
        task1.connectTo(task2);
        task2.connectTo(start);

        editor.render(document.body);
      })();
    </script>
  </body>
</html>
