  /**
   * Internal: set up the JointJS graph and renderer
   */
  _setupRenderer() {
    this.graph = new joint.dia.Graph({}, { cellNamespace: joint.shapes });
    this.renderer = new joint.dia.Paper({
      el: this.paperElement,
      model: this.graph,
      width: '100%',
      height: '100%',
      gridSize: this.gridSize,
      drawGrid: { name: 'dot', color: '#e9ecef' },
      background: { color: '#ffffff' },
      cellNamespace: joint.shapes,
      defaultConnector: { name: 'rounded' },
      defaultRouter: { name: 'manhattan', args: { step: this.gridSize, padding: 30, maxIter: 200 } },
      interactive: { linkMove: true, vertexAdd: true, vertexMove: true, elementMove: true },
      preventDefaultBlankAction: false,
      linkPinning: false,
      snapLinks: { radius: 25 },
      markAvailable: true,
      defaultLink: () => new joint.shapes.standard.Link({
        attrs: { line: { stroke: '#495057', strokeWidth: 2, targetMarker: ARROW_MARKERS.classic } }
      }),
      validateConnection: (sourceView, sourceMagnet, targetView, targetMagnet) => {
        // prevent self-connections and connections from non-port elements
        return sourceMagnet && targetMagnet && sourceView !== targetView;
      }
    });
  }

  /**
   * Internal: wire up all button and UI event listeners
   */
  _attachButtonListeners() {
    // export
    this.exportButton.addEventListener('click', () => {
      try {
        const blob = new Blob([this.serialize()], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const anchor = Object.assign(document.createElement('a'), { href: url, download: 'diagram.json' });

        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (error) {
        alert('Export failed: ' + error.message);
      }
    });

    // import
    this.importButton.addEventListener('click', () => this.importFileInput.click());

    this.importFileInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = loadEvent => this.deserialize(loadEvent.target.result)
        .catch(error => alert('Import failed: ' + error.message));
      reader.readAsText(file);
      event.target.value = '';
    });

    // sidebar toggles
    this.leftCollapseButton.addEventListener('click', () => this._toggleSidebar(this.leftSidebar));
    this.rightCollapseButton.addEventListener('click', () => this._toggleSidebar(this.rightSidebar));

    // toolbar buttons
    this.autoPortToggleButton.addEventListener('click', () => this.setAutoPortSwitching(!this.autoPortsOn));
    this.autoArrangeButton.addEventListener('click', () => this.autoArrange());

    // zoom buttons
    this.zoomToFitButton.addEventListener('click', () => this.zoomToFit());
    this.zoomResetButton.addEventListener('click', () => this.zoomReset());
    this.zoomInButton.addEventListener('click', () => this.zoomIn());
    this.zoomOutButton.addEventListener('click', () => this.zoomOut());
    this.centerButton.addEventListener('click', () => this.centerContent());

    // mouse wheel zoom / pan
    this.renderer.el.addEventListener('wheel', event => {
      event.preventDefault();
      if (event.ctrlKey) {
        // ctrl + scroll = zoom centred on the cursor
        this._zoomAtPoint(Math.exp(-event.deltaY * 0.0015), event.clientX, event.clientY);
      } else {
        // plain scroll = pan
        const translation = this.renderer.translate();
        this.renderer.translate(translation.tx - event.deltaX, translation.ty - event.deltaY);
      }
    }, { passive: false });

    // right-click context menu
    this.contextMenu.addEventListener('click', event => {
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (action === 'duplicate') { this._duplicateSelected(); }
      if (action === 'delete')    { this._deleteSelected(); }
      this.contextMenu.style.display = 'none';
    });

    window.addEventListener('click', event => {
      if (!event.target.closest('.wf-context-menu')) {
        this.contextMenu.style.display = 'none';
      }
    });

    // properties panel header actions (focus, duplicate, delete)
    this.propertiesHeaderActions.addEventListener('click', event => {
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (!action) {
        return;
      }
      if (action === 'focus') {
        this._focusCameraOnSelection();
      }
      if (action === 'duplicate') {
        this._duplicateSelected();
        if (this._isMobile()) { this._toggleSidebar(this.rightSidebar); }
      }
      if (action === 'delete') {
        this._deleteSelected();
        if (this._isMobile()) { this._toggleSidebar(this.rightSidebar); }
      }
    });

    // property input changes
    this.nodePropertiesPanel.addEventListener('input', event => this._handleNodePropertyChange(event));
    this.nodePropertiesPanel.addEventListener('change', event => this._handleNodePropertyChange(event));
    this.edgePropertiesPanel.addEventListener('input', event => this._handleEdgePropertyChange(event));
    this.edgePropertiesPanel.addEventListener('change', event => this._handleEdgePropertyChange(event));

    // drag-and-drop from the shape library
    this.canvasArea.addEventListener('dragover', event => event.preventDefault());
    this.canvasArea.addEventListener('drop', event => {
      event.preventDefault();

      // check if the dragged item is a custom node type
      const customLabel = event.dataTransfer.getData('customNode');
      if (customLabel && this.registeredNodeTypes?.[customLabel]) {
        const NodeClass = this.registeredNodeTypes[customLabel];
        const dropPosition = this.renderer.clientToLocalPoint({ x: event.clientX, y: event.clientY });

        const node = new NodeClass();
        const openPosition = this._findOpenPosition(dropPosition.x - 70, dropPosition.y - 25, 140, 50);
        const cell = node._buildCell(openPosition, joint.shapes);
        cell.attr('label/text', node._label);
        node.cell = cell;
        node.editor = this;

        Object.entries(node.customProps).forEach(([key, value]) => cell.set(`custom_${key}`, value));
        cell.addTo(this.graph);
        this.nodeMap.set(cell.id, node);
        this.clearSelection();

        (async () => {
          await this._waitForRender(cell);
          await this._resizeNodeAsync(cell);

          if (node.renderFn) { node.renderFn(node); }

          await this._waitForRender(cell);
          node.on('change', changedNode => this.emit('node:change', changedNode));
          node.on('move', movedNode => this.emit('node:move', movedNode));
          this._selectItem(node);
        })();

        this.emit('node:add', node);
        return;
      }

      // otherwise it must be a built-in shape type
      const droppedType = event.dataTransfer.getData('type');
      const builtInShapes = [
        { type: 'rect',     cls: Rectangle },
        { type: 'square',   cls: Square    },
        { type: 'ellipse',  cls: Ellipse   },
        { type: 'circle',   cls: Circle    },
        { type: 'diamond',  cls: Diamond   },
        { type: 'triangle', cls: Triangle  },
        { type: 'hexagon',  cls: Hexagon   },
        { type: 'pentagon', cls: Pentagon  },
        { type: 'octagon',  cls: Octagon   },
      ];

      const match = builtInShapes.find(shape => shape.type === droppedType);
      if (!match) {
        return;
      }

      const label = droppedType.charAt(0).toUpperCase() + droppedType.slice(1);
      const dropPosition = this.renderer.clientToLocalPoint({ x: event.clientX, y: event.clientY });

      const node = new match.cls(label.toUpperCase());
      const isSquarish = ['square', 'circle', 'diamond'].includes(droppedType);
      const width = isSquarish ? 80 : 140;
      const height = isSquarish ? 80 : 50;

      const openPosition = this._findOpenPosition(dropPosition.x - width / 2, dropPosition.y - height / 2, width, height);
      const cell = node._buildCell(openPosition, joint.shapes);
      cell.attr('label/text', node._label);
      node.cell = cell;
      node.editor = this;
      cell.addTo(this.graph);
      this.nodeMap.set(cell.id, node);
      this.clearSelection();

      (async () => {
        await this._waitForRender(cell);
        await this._resizeNodeAsync(cell);
        await this._waitForRender(cell);
        node.on('change', changedNode => this.emit('node:change', changedNode));
        node.on('move', movedNode => this.emit('node:move', movedNode));
        this._selectItem(node);
      })();

      this.emit('node:add', node);
    });

    // image upload in the node properties panel
    this.nodePropertiesPanel.querySelector('[data-action="upload-image"]').addEventListener('click', () => {
      this.nodePropertiesPanel.querySelector('[data-action="image-file"]').click();
    });

    this.nodePropertiesPanel.querySelector('[data-action="image-file"]').addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = loadEvent => {
        this.nodePropertiesPanel.querySelector('[data-prop="imageUrl"]').value = loadEvent.target.result;

        if (this.selection instanceof Node) {
          this.selection.imageUrl = loadEvent.target.result;
        }
      };
      reader.readAsDataURL(file);
    });
  }

  /**
   * Internal: handle a property input change in the node properties panel
   */
  _handleNodePropertyChange(event) {
    if (!(this.selection instanceof Node)) {
      return;
    }
    const input = event.target.closest('[data-prop]');
    if (!input) {
      return;
    }

    const prop = input.dataset.prop;
    const value = input.type === 'number' ? parseFloat(input.value) : input.value;

    // keep the paired hex text input / colour picker in sync
    if (input.dataset.pair) {
      this.nodePropertiesPanel.querySelector(`[data-prop="${input.dataset.pair}"]`).value = value;
    }
    if (input.dataset.pairPicker) {
      this.nodePropertiesPanel.querySelector(`[data-prop="${input.dataset.pairPicker}"]`).value = value;
    }

    // strip the 'Hex' suffix so 'backgroundColorHex' maps to 'backgroundColor'
    const resolvedProp = prop.endsWith('Hex') ? prop.slice(0, -3) : prop;
    if (resolvedProp in this.selection) {
      this.selection[resolvedProp] = value;
    }
  }

  /**
   * Internal: handle a property input change in the edge properties panel
   */
  _handleEdgePropertyChange(event) {
    if (!(this.selection instanceof Edge)) {
      return;
    }
    const input = event.target.closest('[data-prop]');
    if (!input) {
      return;
    }

    const prop = input.dataset.prop;
    const value = input.type === 'number' ? parseFloat(input.value) : input.value;

    if (input.dataset.pair) {
      this.edgePropertiesPanel.querySelector(`[data-prop="${input.dataset.pair}"]`).value = value;
    }
    if (input.dataset.pairPicker) {
      this.edgePropertiesPanel.querySelector(`[data-prop="${input.dataset.pairPicker}"]`).value = value;
    }

    const resolvedProp = prop.endsWith('Hex') ? prop.slice(0, -3) : prop;
    if (resolvedProp in this.selection) {
      this.selection[resolvedProp] = value;
    }
  }

  /**
   * Internal: wire up all JointJS diagram event listeners
   */
  _attachDiagramListeners() {
    // custom circular arrowhead used on the source end of selected edges
    const CustomSourceArrowhead = joint.linkTools.SourceArrowhead.extend({
      tagName: 'circle',
      attributes: { r: 6, fill: '#3498db', stroke: '#fff', 'stroke-width': 2, cursor: 'move' }
    });

    // node pointer events

    this.renderer.on('element:pointerdown', (view, event) => {
      const node = this.nodeMap.get(view.model.id);
      if (!node) {
        return;
      }

      this.pointerDownAt = { x: event.clientX, y: event.clientY };
      this.selectionWasAlreadyActive = this.selection === node;
      this._deselectAll();

      if (!this._isMobile()) {
        node.cell.toFront();
      }
      this._selectItem(node);
    });

    this.renderer.on('element:pointerup', (view, event) => {
      const deltaX = Math.abs(event.clientX - (this.pointerDownAt?.x ?? event.clientX));
      const deltaY = Math.abs(event.clientY - (this.pointerDownAt?.y ?? event.clientY));

      // if the user tapped (not dragged) an already-selected node, open the properties panel
      if (deltaX < 5 && deltaY < 5 && this.selectionWasAlreadyActive && this.rightSidebar.classList.contains('wf-collapsed')) {
        this._toggleSidebar(this.rightSidebar);
      }

      this.pointerDownAt = null;
      this.selectionWasAlreadyActive = false;

      // snap the node to the nearest clear grid position after a drag
      if (!this._isMobile()) {
        const node = this.nodeMap.get(view.model.id);
        if (node) {
          const bbox = node.cell.getBBox();
          const openPosition = this._findOpenPosition(bbox.x, bbox.y, bbox.width, bbox.height, node.cell);
          node.cell.position(openPosition.x, openPosition.y);
        }
      }
    });

    // edge pointer events

    this.renderer.on('link:pointerdown', view => {
      const edge = this.edgeMap.get(view.model.id);
      if (!edge) {
        return;
      }

      this._deselectAll();
      view.model.toFront();
      this._selectItem(edge);

      // attach editing tools to the selected edge
      view.addTools(new joint.dia.ToolsView({ tools: [
        new joint.linkTools.Vertices(),
        new CustomSourceArrowhead(),
        new joint.linkTools.TargetArrowhead({ offset: -1 }),
        new joint.linkTools.Remove({ distance: 20 })
      ]}));
    });

    // show ports while dragging a new edge from a port
    this.renderer.on('cell:pointerdown tool:pointerdown', (view, event) => {
      if (event?.target?.closest?.('.joint-port')) {
        this.renderer.el.classList.add('wf-dragging-link');
      }
    });

    this.renderer.on('cell:pointerup link:pointerup tool:pointerup', () => {
      this.renderer.el.classList.remove('wf-dragging-link');
    });

    // context menu

    this.renderer.on('cell:contextmenu', (view, event) => {
      event.preventDefault();

      const rect = this.canvasArea.getBoundingClientRect();
      this.contextMenu.style.display = 'block';
      this.contextMenu.style.left = (event.clientX - rect.left) + 'px';
      this.contextMenu.style.top = (event.clientY - rect.top) + 'px';

      // only show Duplicate for nodes, not edges
      this.contextMenu.querySelector('[data-action="duplicate"]').style.display =
        this.nodeMap.has(view.model.id) ? 'flex' : 'none';
    });

    // blank canvas pan

    this.renderer.on('blank:pointerdown', event => {
      this._collapseAllSidebarsOnMobile();

      const startX = event.clientX;
      const startY = event.clientY;
      const initialTranslation = this.renderer.translate();

      if (this._isMobile()) {
        this._deselectAll();
        return;
      }

      const onMove = moveEvent => this.renderer.translate(
        initialTranslation.tx + (moveEvent.clientX - startX),
        initialTranslation.ty + (moveEvent.clientY - startY)
      );

      const onUp = upEvent => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);

        // a click (no drag) on blank space clears the selection
        if (Math.abs(upEvent.clientX - startX) < 5 && Math.abs(upEvent.clientY - startY) < 5) {
          this._deselectAll();
        }
      };

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // edge connection completed

    this.renderer.on('link:connect', view => {
      const link = view.model;
      const sourceCell = link.getSourceElement();
      const targetCell = link.getTargetElement();
      if (!sourceCell || !targetCell) {
        return;
      }

      const sourceNode = this.nodeMap.get(sourceCell.id);
      const targetNode = this.nodeMap.get(targetCell.id);
      if (!sourceNode || !targetNode || this.edgeMap.has(link.id)) {
        return;
      }

      // disallow reverse duplicate edges (A→B when B→A already exists)
      const reverseExists = [...this.edgeMap.values()].some(
        edge => edge.source === targetNode && edge.target === sourceNode
      );
      if (reverseExists) {
        link.remove();
        return;
      }

      const edge = new Edge(link, sourceNode, targetNode, this);
      this.edgeMap.set(link.id, edge);
      edge.on('change', changedEdge => this.emit('edge:change', changedEdge));
      this.emit('edge:add', edge);
    });

    // cell removal

    this.graph.on('remove', cell => {
      if (cell.isLink()) {
        const edge = this.edgeMap.get(cell.id);
        if (edge) {
          this.edgeMap.delete(cell.id);
          this.emit('edge:remove', edge);
        }
      } else {
        const node = this.nodeMap.get(cell.id);
        if (node) {
          this.nodeMap.delete(cell.id);
          this.emit('node:remove', node);
        }
      }
    });

    // update auto-ports whenever a node is moved
    this.graph.on('change:position', cell => {
      const node = this.nodeMap.get(cell.id);
      if (node) {
        this._updateConnectionPorts(cell);
        node.emit('move', node);
      }
    });
  }

  /**
   * Internal: wire up keyboard shortcuts
   */
  _attachKeyboardShortcuts() {
    this.clipboard = null;
    this.canvasArea.tabIndex = 0;
    this.canvasArea.style.outline = 'none';
    this.canvasArea.focus();

    // reclaim focus whenever the user clicks the canvas (unless typing in a field)
    this.canvasArea.addEventListener('mousedown', () => {
      const tag = document.activeElement?.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
        this.canvasArea.focus();
      }
    });

    this.canvasArea.addEventListener('keydown', async event => {
      const tag = document.activeElement?.tagName;
      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      // F2 or Enter → open label editor for the selected item
      if (event.key === 'F2' || (!isTyping && event.key === 'Enter')) {
        if (this.selection instanceof Node || this.selection instanceof Edge) {
          event.preventDefault();

          if (this.rightSidebar.classList.contains('wf-collapsed')) {
            this._toggleSidebar(this.rightSidebar);
          }

          await this._waitForRender(this.selection.cell ?? this.selection.link);

          const panel = this.selection instanceof Node ? this.nodePropertiesPanel : this.edgePropertiesPanel;
          const labelInput = panel.querySelector('[data-prop="label"]');
          if (labelInput) {
            labelInput.focus();
            labelInput.select();
          }
        }
        return;
      }

      if (isTyping) {
        return;
      }

      if (event.key === 'Escape') {
        event.preventDefault();
        this._deselectAll();
        return;
      }

      if (event.key === 'Delete' || event.key === 'Backspace') {
        event.preventDefault();
        this._deleteSelected();
        return;
      }

      if (event.key === '-' && !event.ctrlKey && !event.metaKey) {
        event.preventDefault();
        this.zoomOut();
        return;
      }

      if ((event.key === '=' || event.key === '+') && !event.ctrlKey && !event.metaKey) {
        event.preventDefault();
        this.zoomIn();
        return;
      }

      // ctrl/cmd + C → copy
      if ((event.ctrlKey || event.metaKey) && event.key === 'c') {
        if (this.selection instanceof Node) {
          event.preventDefault();
          this.clipboard = this.selection;
        }
        return;
      }

      // ctrl/cmd + V → paste
      if ((event.ctrlKey || event.metaKey) && event.key === 'v') {
        if (this.clipboard) {
          event.preventDefault();

          const bbox = this.clipboard.cell.getBBox();
          const openPosition = this._findOpenPosition(bbox.x + 40, bbox.y + 40, bbox.width, bbox.height);
          const clonedCell = this.clipboard.cell.clone();

          clonedCell.position(openPosition.x, openPosition.y);
          clonedCell.addTo(this.graph);
          this._deselectAll();

          const copy = new this.clipboard.constructor(this.clipboard.label);
          copy.cell = clonedCell;
          copy.editor = this;
          this.nodeMap.set(clonedCell.id, copy);

          (async () => {
            await this._waitForRender(clonedCell);
            await this._resizeNodeAsync(clonedCell);
            await this._waitForRender(clonedCell);
            copy.on('change', changedNode => this.emit('node:change', changedNode));
            copy.on('move', movedNode => this.emit('node:move', movedNode));
            this._selectItem(copy);
          })();

          this.emit('node:add', copy);
        }
        return;
      }

      // arrow keys → nudge the selected node or pan the canvas
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
        event.preventDefault();

        const deltaX = event.key === 'ArrowLeft' ? -this.gridSize : event.key === 'ArrowRight' ? this.gridSize : 0;
        const deltaY = event.key === 'ArrowUp'   ? -this.gridSize : event.key === 'ArrowDown'  ? this.gridSize : 0;

        if (this.selection instanceof Node) {
          this.selection.moveBy(deltaX, deltaY);
        } else if (!this.selection) {
          const translation = this.renderer.translate();
          this.renderer.translate(translation.tx - deltaX, translation.ty - deltaY);
        }
      }
    });
  }

  /**
   * Internal: handle touch gestures for mobile pan and pinch-zoom
   */
  _attachTouchListeners() {
    this.renderer.el.addEventListener('touchstart', event => {
      if (!this._isMobile()) {
        return;
      }

      if (event.touches.length === 1) {
        const touch = event.touches[0];

        // let JointJS handle touches that land on a node
        if (document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.joint-cell')) {
          return;
        }

        event.stopPropagation();
        this.touchState = {
          type: 'pan',
          startX: touch.clientX,
          startY: touch.clientY,
          initialTranslation: this.renderer.translate()
        };
      } else if (event.touches.length === 2) {
        event.stopPropagation();

        const touch1 = event.touches[0];
        const touch2 = event.touches[1];
        this.touchState = {
          type: 'pinch',
          initialDistance: this._touchDistance(touch1, touch2),
          initialMidpoint: this._touchMidpoint(touch1, touch2),
          initialScale: this.renderer.scale().sx,
          initialTranslation: this.renderer.translate()
        };
      }
    }, { passive: true });

    this.renderer.el.addEventListener('touchmove', event => {
      if (!this._isMobile() || !this.touchState) {
        return;
      }
      event.preventDefault();

      const state = this.touchState;

      if (state.type === 'pan' && event.touches.length === 1) {
        const touch = event.touches[0];
        this.renderer.translate(
          state.initialTranslation.tx + (touch.clientX - state.startX),
          state.initialTranslation.ty + (touch.clientY - state.startY)
        );
      } else if (state.type === 'pinch' && event.touches.length === 2) {
        const touch1 = event.touches[0];
        const touch2 = event.touches[1];
        const newScale = Math.max(0.1, Math.min(10,
          state.initialScale * this._touchDistance(touch1, touch2) / state.initialDistance
        ));
        const midpoint = this._touchMidpoint(touch1, touch2);
        const rect = this.renderer.el.getBoundingClientRect();
        const viewportX = midpoint.x - rect.left;
        const viewportY = midpoint.y - rect.top;
        const originX = (viewportX - state.initialTranslation.tx) / state.initialScale;
        const originY = (viewportY - state.initialTranslation.ty) / state.initialScale;

        this.renderer.scale(newScale, newScale);
        this.renderer.translate(viewportX - originX * newScale, viewportY - originY * newScale);
      }
    }, { passive: false });

    this.renderer.el.addEventListener('touchend', event => {
      if (!this._isMobile()) {
        return;
      }

      // lifting one finger during a pinch transitions back to panning
      if (this.touchState?.type === 'pinch' && event.touches.length === 1) {
        const touch = event.touches[0];
        this.touchState = {
          type: 'pan',
          startX: touch.clientX,
          startY: touch.clientY,
          initialTranslation: this.renderer.translate()
        };
      } else {
        this.touchState = null;
      }
    }, { passive: true });
  }

  /**
   * Internal: select a node or edge and show its properties
   */
  _selectItem(item) {
    this.selection = item;
    const isNode = item instanceof Node;
    const model = isNode ? item.cell : item.link;
    const view = this.renderer.findViewByModel(model);

    if (view) {
      view.el.classList.add('wf-selected');
      joint.highlighters.stroke.add(view, 'root', 'selection', {
        padding: 5,
        attrs: { stroke: '#3498db', 'stroke-width': 3 }
      });
    }

    this.propertiesHeaderActions.style.display = 'flex';
    this.propertiesHeaderActions.querySelector('[data-action="duplicate"]').style.display = isNode ? 'flex' : 'none';

    if (isNode) {
      this._showPropertiesPanel('node');
      this._fillNodeProperties(item);
    } else {
      this._showPropertiesPanel('edge');
      this._fillEdgeProperties(item);
    }

    this.emit('selection:change', item);
    this._updateMobileButtonVisibility();
  }

  /**
   * Internal: clear the current selection
   */
  _deselectAll() {
    if (this.selection) {
      const model = this.selection instanceof Node ? this.selection.cell : this.selection.link;
      this.renderer.findViewByModel(model)?.el.classList.remove('wf-selected');
    }

    this.renderer.removeTools();
    joint.highlighters.stroke.removeAll(this.renderer);
    this.selection = null;
    this.propertiesHeaderActions.style.display = 'none';
    this._showPropertiesPanel('none');
    this.emit('selection:change', null);
    this.canvasArea.focus();
    this._updateMobileButtonVisibility();
  }

  /**
   * Internal: switch which properties panel is visible
   */
  _showPropertiesPanel(which) {
    this.nodePropertiesPanel.style.display = which === 'node' ? 'flex' : 'none';
    this.edgePropertiesPanel.style.display = which === 'edge' ? 'flex' : 'none';
    this.noSelectionMessage.style.display  = which === 'none' ? 'block' : 'none';
  }

  /**
   * Internal: populate the node properties panel with the given node's values
   */
  _fillNodeProperties(node) {
    const panel = this.nodePropertiesPanel;
    const setField = (prop, value) => {
      const element = panel.querySelector(`[data-prop="${prop}"]`);
      if (element) {
        element.value = value ?? '';
      }
    };

    setField('label',               node.label);
    setField('labelFontSize',       node.labelFontSize);
    setField('description',         node.description);
    setField('imageUrl',            node.imageUrl);
    setField('imageWidth',          node.imageWidth);
    setField('imageHeight',         node.imageHeight);
    setField('backgroundColor',     node.backgroundColor);
    setField('backgroundColorHex',  node.backgroundColor);
    setField('borderColor',         node.borderColor);
    setField('borderColorHex',      node.borderColor);
    setField('labelColor',          node.labelColor);
    setField('labelColorHex',       node.labelColor);
    setField('descriptionColor',    node.descriptionColor);
    setField('descriptionColorHex', node.descriptionColor);

    // remove any previous custom fields before rebuilding them
    panel.querySelector('.wf-custom-props')?.remove();
    const schema = node.getSchema?.() ?? {};
    if (!Object.keys(schema).length) {
      return;
    }

    const customSection = this._makeElement('div', 'wf-custom-props');
    const divider = customSection.appendChild(this._makeElement('div'));
    divider.style.cssText = 'border-top:1px solid #dee2e6;margin:4px 0;';

    Object.entries(schema).forEach(([key, fieldDefinition]) => {
      if (fieldDefinition.visible === false) {
        return;
      }

      const group = customSection.appendChild(this._makeElement('div', 'wf-prop-group'));
      const label = group.appendChild(this._makeElement('label'));
      label.textContent = fieldDefinition.label ?? key;

      const currentValue = node.getCustomProperty(key);
      let input;

      if (fieldDefinition.type === 'choice') {
        input = this._makeElement('select');
        Object.entries(fieldDefinition.choices ?? {}).forEach(([value, label]) => {
          const option = input.appendChild(this._makeElement('option'));
          option.value = value;
          option.textContent = label;
        });
        input.value = currentValue ?? fieldDefinition.default;

      } else if (fieldDefinition.type === 'textarea') {
        input = this._makeElement('textarea');
        input.value = currentValue ?? '';

      } else if (fieldDefinition.type === 'boolean') {
        input = this._makeElement('input');
        input.type = 'checkbox';
        input.checked = currentValue ?? fieldDefinition.default ?? false;
        input.style.cssText = 'width:auto !important;margin:0;cursor:pointer;align-self:flex-start;';
        group.appendChild(input);

      } else if (fieldDefinition.type === 'color') {
        // color fields get both a colour picker and a hex text input
        const row = group.appendChild(this._makeElement('div', 'wf-color-row'));
        const picker = this._makeElement('input');
        picker.type = 'color';
        picker.value = currentValue ?? fieldDefinition.default ?? '#000000';
        const hexInput = this._makeElement('input');
        hexInput.type = 'text';
        hexInput.value = currentValue ?? fieldDefinition.default ?? '#000000';

        picker.addEventListener('input', () => {
          hexInput.value = picker.value;
          node.setCustomProperty(key, picker.value);
        });
        hexInput.addEventListener('input', () => {
          picker.value = hexInput.value;
          node.setCustomProperty(key, hexInput.value);
        });

        row.appendChild(picker);
        row.appendChild(hexInput);
        group.appendChild(row);
        return;

      } else {
        input = this._makeElement('input');
        input.type = fieldDefinition.type === 'number' ? 'number' : 'text';
        input.value = currentValue ?? '';
        if (fieldDefinition.min !== undefined) { input.min = fieldDefinition.min; }
        if (fieldDefinition.max !== undefined) { input.max = fieldDefinition.max; }
      }

      if (fieldDefinition.readonly) {
        input.disabled = true;
      }
      group.appendChild(input);

      input.addEventListener(fieldDefinition.type === 'boolean' ? 'change' : 'input', () => {
        let newValue;
        if (fieldDefinition.type === 'boolean') {
          newValue = input.checked;
        } else if (fieldDefinition.type === 'number') {
          newValue = parseFloat(input.value);
        } else {
          newValue = input.value;
        }
        node.setCustomProperty(key, newValue);
      });
    });

    panel.appendChild(customSection);
  }

  /**
   * Internal: populate the edge properties panel with the given edge's values
   */
  _fillEdgeProperties(edge) {
    const panel = this.edgePropertiesPanel;
    const setField = (prop, value) => {
      const element = panel.querySelector(`[data-prop="${prop}"]`);
      if (element) {
        element.value = value ?? '';
      }
    };

    setField('label',         edge.label);
    setField('labelFontSize', edge.labelFontSize);
    setField('labelColor',    edge.labelColor);
    setField('labelColorHex', edge.labelColor);
    setField('lineColor',     edge.lineColor);
    setField('lineColorHex',  edge.lineColor);
    setField('lineStyle',     edge.lineStyle);
    setField('connectorType', edge.connectorType);
    setField('sourceArrow',   edge.sourceArrow);
    setField('targetArrow',   edge.targetArrow);
    setField('description',   edge.description);
  }

  /**
   * Internal: collapse or expand a sidebar
   */
  _toggleSidebar(sidebar) {
    const isLeft = sidebar === this.leftSidebar;
    const icon = isLeft ? this.leftCollapseIcon : this.rightCollapseIcon;
    const previousTranslation = this.renderer.translate();
    const isNowCollapsed = sidebar.classList.toggle('wf-collapsed');

    icon.style.transform = isNowCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    sidebar.querySelector('.wf-collapsed-label').style.display = isNowCollapsed ? 'block' : 'none';

    // on mobile, opening one sidebar closes the other
    if (this._isMobile() && !isNowCollapsed) {
      const otherSidebar = isLeft ? this.rightSidebar : this.leftSidebar;
      const otherIcon = isLeft ? this.rightCollapseIcon : this.leftCollapseIcon;
      if (!otherSidebar.classList.contains('wf-collapsed')) {
        otherSidebar.classList.add('wf-collapsed');
        otherIcon.style.transform = 'rotate(180deg)';
        otherSidebar.querySelector('.wf-collapsed-label').style.display = 'block';
      }
    }

    // continuously resize the renderer during the CSS transition
    const interval = setInterval(() => {
      const area = this.canvasArea;
      this.renderer.setDimensions(area.clientWidth, area.clientHeight);
      this.renderer.translate(previousTranslation.tx, previousTranslation.ty);
    }, 16);
    setTimeout(() => clearInterval(interval), 350);

    this._updateMobileButtonVisibility();
  }

  /**
   * Internal: set a sidebar's collapsed state directly (no toggle)
   */
  _setSidebarCollapsed(sidebar, collapsed) {
    const isLeft = sidebar === this.leftSidebar;
    const icon = isLeft ? this.leftCollapseIcon : this.rightCollapseIcon;

    sidebar.classList.toggle('wf-collapsed', collapsed);
    icon.style.transform = collapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    sidebar.querySelector('.wf-collapsed-label').style.display = collapsed ? 'block' : 'none';
  }

  /**
   * Internal: collapse all sidebars on mobile (e.g. when tapping blank canvas)
   */
  _collapseAllSidebarsOnMobile() {
    if (!this._isMobile()) {
      return;
    }

    const previousTranslation = this.renderer.translate();
    this._setSidebarCollapsed(this.leftSidebar, true);
    this._setSidebarCollapsed(this.rightSidebar, true);

    const interval = setInterval(() => {
      const area = this.canvasArea;
      this.renderer.setDimensions(area.clientWidth, area.clientHeight);
      this.renderer.translate(previousTranslation.tx, previousTranslation.ty);
    }, 16);
    setTimeout(() => clearInterval(interval), 350);

    this._updateMobileButtonVisibility();
  }

  /**
   * Internal: duplicate the currently selected node
   */
  _duplicateSelected() {
    if (!(this.selection instanceof Node)) {
      return;
    }

    const bbox = this.selection.cell.getBBox();
    const openPosition = this._findOpenPosition(bbox.x + 40, bbox.y + 40, bbox.width, bbox.height);
    const clonedCell = this.selection.cell.clone();

    clonedCell.translate(openPosition.x - bbox.x, openPosition.y - bbox.y);
    clonedCell.addTo(this.graph);

    const copy = new this.selection.constructor(this.selection.label);
    copy.cell = clonedCell;
    copy.editor = this;
    this.nodeMap.set(clonedCell.id, copy);
    this._selectItem(copy);
    this.emit('node:add', copy);
  }

  /**
   * Internal: delete the currently selected node or edge
   */
  _deleteSelected() {
    if (!this.selection) {
      return;
    }
    const item = this.selection;
    this._deselectAll();
    item.remove();
  }

  /**
   * Internal: pan and zoom the camera to centre on the selected item
   */
  _focusCameraOnSelection() {
    if (!this.selection) {
      return;
    }
    const model = this.selection instanceof Node ? this.selection.cell : this.selection.link;
    const center = model.getBBox().center();
    const size = this.renderer.getComputedSize();

    this.renderer.scale(1, 1);
    this.renderer.translate(size.width / 2 - center.x, size.height / 2 - center.y);
  }

  /**
   * Internal: create an edge between two nodes
   */
  _createEdge(sourceNode, targetNode, sourcePortIndex, targetPortIndex) {
    // disallow a reverse edge if one already exists in the other direction
    const reverseExists = [...this.edgeMap.values()].some(
      edge => edge.source === targetNode && edge.target === sourceNode
    );
    if (reverseExists) {
      return null;
    }

    const link = new joint.shapes.standard.Link({
      attrs: { line: { stroke: '#495057', strokeWidth: 2, targetMarker: ARROW_MARKERS.classic } }
    });

    // resolve port indices to actual port objects
    const sourcePorts = sourceNode.cell.getPorts();
    const targetPorts = targetNode.cell.getPorts();
    const sourcePort = sourcePortIndex !== null ? sourcePorts[sourcePortIndex - 1] : null;
    const targetPort = targetPortIndex !== null ? targetPorts[targetPortIndex - 1] : null;

    link.source(sourcePort ? { id: sourceNode.cell.id, port: sourcePort.id } : { id: sourceNode.cell.id });
    link.target(targetPort ? { id: targetNode.cell.id, port: targetPort.id } : { id: targetNode.cell.id });

    if (sourcePortIndex !== null) { link.set('sourcePort', sourcePortIndex); }
    if (targetPortIndex !== null) { link.set('targetPort', targetPortIndex); }

    this.graph.startBatch('edge');
    link.addTo(this.graph);
    this.graph.stopBatch('edge');
    this.renderer.updateViews();

    const edge = new Edge(link, sourceNode, targetNode, this);
    this.edgeMap.set(link.id, edge);
    edge.on('change', changedEdge => this.emit('edge:change', changedEdge));
    this.emit('edge:add', edge);
    return edge;
  }

  /**
   * Internal: return all edges connected to a given node
   */
  _getEdgesForNode(node) {
    return [...this.edgeMap.values()].filter(edge => edge.source === node || edge.target === node);
  }

  /**
   * Internal: re-route auto-managed ports for all edges connected to a cell
   */
  _updateConnectionPorts(cell) {
    if (!this.autoPortsOn || this.isLoading) {
      return;
    }

    this.graph.getConnectedLinks(cell).forEach(link => {
      // skip links that have a manually pinned port on either end
      if (typeof link.get('sourcePort') === 'number') { return; }
      if (typeof link.get('targetPort') === 'number') { return; }

      const sourceCell = link.getSourceElement();
      const targetCell = link.getTargetElement();
      if (!sourceCell || !targetCell) {
        return;
      }

      // returns the centre point of a cell in graph coordinates
      const getCenterOf = element => {
        const position = element.position();
        const size = element.size();
        return { x: position.x + size.width / 2, y: position.y + size.height / 2 };
      };

      // returns the port ID whose angle most closely faces towardPoint
      const getBestPortFacing = (element, towardPoint) => {
        const center = getCenterOf(element);
        const angleToward = Math.atan2(towardPoint.y - center.y, towardPoint.x - center.x);
        const portPositions = element.getPortsPositions('all');
        const size = element.size();
        let bestPortId = null;
        let bestAngleDiff = Infinity;

        element.getPorts().forEach(port => {
          const position = portPositions[port.id];
          if (!position) {
            return;
          }
          const portAngle = Math.atan2(position.y - size.height / 2, position.x - size.width / 2);
          let angleDiff = Math.abs(angleToward - portAngle);
          if (angleDiff > Math.PI) {
            angleDiff = 2 * Math.PI - angleDiff;
          }
          if (angleDiff < bestAngleDiff) {
            bestAngleDiff = angleDiff;
            bestPortId = port.id;
          }
        });
        return bestPortId;
      };

      const sourceCenter = getCenterOf(sourceCell);
      const targetCenter = getCenterOf(targetCell);
      const bestSourcePort = getBestPortFacing(sourceCell, targetCenter);
      const bestTargetPort = getBestPortFacing(targetCell, sourceCenter);

      if (link.source().port !== bestSourcePort) {
        link.source({ id: sourceCell.id, port: bestSourcePort });
        link.unset('sourcePort');
      }
      if (link.target().port !== bestTargetPort) {
        link.target({ id: targetCell.id, port: bestTargetPort });
        link.unset('targetPort');
      }
    });
  }

  /**
   * Internal: return a promise that resolves once a cell's view is in the DOM
   */
  _waitForRender(cell) {
    return new Promise(resolve => {
      const view = this.renderer.findViewByModel(cell);
      if (!view) {
        resolve();
        return;
      }
      // two rAF passes ensure the browser has fully painted the cell
      requestAnimationFrame(() => requestAnimationFrame(() => resolve(view)));
    });
  }

  /**
   * Internal: resize a cell asynchronously after it has been rendered
   */
  async _resizeNodeAsync(cell) {
    this._fitNodeToContent(cell);
    await this._waitForRender(cell);
    this.renderer.updateViews();
  }

  /**
   * Internal: measure the cell's content and resize it to fit
   */
  _fitNodeToContent(cell) {
    const view = this.renderer.findViewByModel(cell);
    if (!view) {
      return;
    }

    const labelElement = view.el.querySelector('.label');
    const descriptionElement = view.el.querySelector('.descriptionLabel');
    if (!labelElement || !descriptionElement) {
      return;
    }

    // scale font sizes according to the labelFontSize percentage
    const fontScale = (cell.get('fontSizePercent') || 100) / 100;
    cell.attr({ label: { fontSize: 13 * fontScale }, descriptionLabel: { fontSize: 11 * fontScale } });

    const imageUrl = cell.get('imageUrl');
    const shapeType = cell.get('type');
    const descriptionText = cell.attr('descriptionLabel/text') || '';
    const imageWidth = parseInt(cell.get('imageWidth') || 32);
    const imageHeight = parseInt(cell.get('imageHeight') || 32);
    const padding = 15;
    const imageSpacing = imageUrl ? 10 : 0;

    // measure the rendered text bounding boxes
    const labelBBox = labelElement.getBBox();
    const descriptionBBox = descriptionElement.getBBox();
    const textWidth = Math.max(labelBBox.width, descriptionBBox.width);
    const totalContentWidth = (imageUrl ? imageWidth : 0) + imageSpacing + textWidth;

    // calculate the minimum size needed to fit all content
    let width = Math.max(140, padding + totalContentWidth + padding);
    const totalTextHeight = descriptionText ? labelBBox.height + descriptionBBox.height : labelBBox.height;
    let height = Math.max(50, padding + Math.max(imageUrl ? imageHeight : 0, totalTextHeight) + padding);

    // certain shapes have aspect ratio constraints
    if (shapeType === 'diamond' || shapeType === 'circle') {
      width = height = Math.max(width, height);
    } else if (['triangle', 'hexagon', 'pentagon', 'octagon'].includes(shapeType)) {
      if (width / height > 1.2) {
        height = width / 1.2;
      } else {
        width = height * 1.2;
      }
      if (shapeType === 'triangle') {
        width *= 1.25;
        height *= 1.25;
      }
    }

    // position the image and text content within the cell
    const contentStartX = (width - totalContentWidth) / 2;
    const textCenterX = contentStartX + (imageUrl ? imageWidth : 0) + imageSpacing + textWidth / 2;

    cell.attr('image', {
      refX: 0, refX2: contentStartX,
      refY: 0.5, y: -imageHeight / 2,
      width: imageWidth, height: imageHeight
    });

    if (descriptionText) {
      const contentStartY = (height - totalTextHeight) / 2;
      cell.attr('label', {
        refX: 0, refX2: textCenterX,
        refY: 0, refY2: contentStartY + labelBBox.height / 2,
        textAnchor: 'middle', textVerticalAnchor: 'middle'
      });
      cell.attr('descriptionLabel', {
        refX: 0, refX2: textCenterX,
        refY: 0, refY2: contentStartY + labelBBox.height + descriptionBBox.height / 2,
        textAnchor: 'middle', textVerticalAnchor: 'middle'
      });
    } else {
      cell.attr('label', {
        refX: 0, refX2: textCenterX,
        refY: 0.5, refY2: 0,
        textAnchor: 'middle', textVerticalAnchor: 'middle'
      });
    }

    cell.resize(width, height);
  }

  /**
   * Internal: returns true if the user is on a touch-only mobile device
   */
  _isMobile() {
    return window.matchMedia('(pointer:coarse) and (max-width:767px)').matches;
  }

  /**
   * Internal: create a DOM element with an optional CSS class
   */
  _makeElement(tag, className = '') {
    const element = document.createElement(tag);
    if (className) {
      element.className = className;
    }
    return element;
  }

  /**
   * Internal: create and append a zoom button to a parent element
   */
  _makeZoomButton(parent, title, html) {
    const button = parent.appendChild(this._makeElement('button', 'wf-ctrl-btn'));
    button.title = title;
    button.innerHTML = html;
    return button;
  }

  /**
   * Internal: zoom the canvas around a specific screen point
   */
  _zoomAtPoint(factor, clientX, clientY) {
    const currentScale = this.renderer.scale().sx;
    const newScale = Math.max(0.1, Math.min(10, currentScale * factor));
    const rect = this.renderer.el.getBoundingClientRect();
    const viewportX = clientX - rect.left;
    const viewportY = clientY - rect.top;
    const translation = this.renderer.translate();

    // keep the point under the cursor stationary as we scale
    const originX = (viewportX - translation.tx) / currentScale;
    const originY = (viewportY - translation.ty) / currentScale;
    this.renderer.scale(newScale, newScale);
    this.renderer.translate(viewportX - originX * newScale, viewportY - originY * newScale);
  }

  /**
   * Internal: zoom the canvas around its visible centre point
   */
  _zoomAtCenter(factor) {
    const rect = this.renderer.el.getBoundingClientRect();
    this._zoomAtPoint(factor, rect.left + rect.width / 2, rect.top + rect.height / 2);
  }

  /**
   * Internal: find the nearest grid-aligned position that doesn't overlap any existing node
   */
  _findOpenPosition(startX, startY, width, height, excludeCell = null) {
    const clearance = this.clearanceUnits * this.gridSize;

    // snap the starting position to the grid
    let x = Math.round(startX / this.gridSize) * this.gridSize;
    let y = Math.round(startY / this.gridSize) * this.gridSize;

    const isBlocked = (testX, testY) => {
      const testRect = new joint.g.Rect(testX, testY, width, height).inflate(clearance);
      return this.graph.getElements().some(element => {
        if (excludeCell && element.id === excludeCell.id) {
          return false;
        }
        return testRect.intersect(element.getBBox().clone().inflate(clearance));
      });
    };

    if (!isBlocked(x, y)) {
      return { x, y };
    }

    // spiral outward until we find a clear spot
    for (let radius = 1; radius < 30; radius++) {
      for (let deltaX = -radius; deltaX <= radius; deltaX++) {
        for (let deltaY = -radius; deltaY <= radius; deltaY++) {
          // only test the perimeter of the current radius
          if (Math.abs(deltaX) !== radius && Math.abs(deltaY) !== radius) {
            continue;
          }
          const testX = x + deltaX * this.gridSize;
          const testY = y + deltaY * this.gridSize;
          if (!isBlocked(testX, testY)) {
            return { x: testX, y: testY };
          }
        }
      }
    }

    // fall back to the original position if nothing was found
    return { x, y };
  }

  /**
   * Internal: calculate the distance between two touch points
   */
  _touchDistance(touch1, touch2) {
    const deltaX = touch1.clientX - touch2.clientX;
    const deltaY = touch1.clientY - touch2.clientY;
    return Math.sqrt(deltaX * deltaX + deltaY * deltaY);
  }

  /**
   * Internal: calculate the midpoint between two touch points
   */
  _touchMidpoint(touch1, touch2) {
    return {
      x: (touch1.clientX + touch2.clientX) / 2,
      y: (touch1.clientY + touch2.clientY) / 2
    };
  }
}

// =============================================================
// Bootstrap — create the editor and add demo nodes
// =============================================================

const editor = new DiagramEditor(document.body);

// example custom node type with extra properties and a render callback
const TaskNode = Node.define(
  Rectangle,
  { label: 'New Task', backgroundColor: '#f0f8ff' },
  {
    assignee: { label: 'Assignee', type: 'text',     default: '' },
    effort:   { label: 'Effort',   type: 'number',   default: 1, min: 1, max: 10 },
    done:     { label: 'Done',     type: 'boolean',  default: false },
    mode:     { label: 'Mode',     type: 'choice',   default: 'auto', choices: { auto: 'Automatic', manual: 'Manual' } },
    note:     { label: 'Note',     type: 'textarea', default: '' },
    accent:   { label: 'Accent',   type: 'color',    default: '#3498db' },
  },
  node => {
    // update the node's appearance when the 'done' flag changes
    node.backgroundColor = node.getCustomProperty('done') ? '#d4edda' : '#f0f8ff';
    node.borderColor     = node.getCustomProperty('done') ? '#28a745' : '#adb5bd';
  }
);
editor.registerNodeType('Task', TaskNode);

(async () => {
  const start   = await editor.addNode(new Ellipse({ label: 'START' }));
  const process = await editor.addNode(new Rectangle({ label: 'PROCESS' }));
  const task    = await editor.addNode(new TaskNode({ label: 'My Task', assignee: 'Alice', effort: 3 }));
})();
