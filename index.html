<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script>
'use strict';

// =============================================================
// EventBus — minimal pub/sub base class
// =============================================================

class EventBus {
  constructor() {
    this.listeners = {};
  }

  on(eventName, callback) {
    if (!this.listeners[eventName]) {
      this.listeners[eventName] = [];
    }
    this.listeners[eventName].push(callback);
    return this;
  }

  off(eventName, callback) {
    if (!this.listeners[eventName]) {
      return this;
    }
    this.listeners[eventName] = this.listeners[eventName].filter(fn => fn !== callback);
    return this;
  }

  emit(eventName, ...args) {
    (this.listeners[eventName] || []).forEach(fn => fn(...args));
    return this;
  }
}

// =============================================================
// PathPoint — a single movable bend point on an edge's path
// =============================================================

class PathPoint extends EventBus {
  constructor(parentEdge, pointIndex) {
    super();
    this.id = `pathpoint-${Math.random().toString(36).slice(2)}`;
    this.edge = parentEdge;
    this.pointIndex = pointIndex;
  }

  get x() {
    return this.edge.vertices()[this.pointIndex]?.x ?? 0;
  }

  get y() {
    return this.edge.vertices()[this.pointIndex]?.y ?? 0;
  }

  moveTo(x, y) {
    const points = [...this.edge.vertices()];
    points[this.pointIndex] = { x, y };
    this.edge.vertices(points);
    this.emit('move', this);
    return this;
  }

  moveBy(deltaX, deltaY) {
    return this.moveTo(this.x + deltaX, this.y + deltaY);
  }

  remove() {
    const points = [...this.edge.vertices()];
    points.splice(this.pointIndex, 1);
    this.edge.vertices(points);
    this.emit('remove', this);
  }
}

// =============================================================
// Arrow marker definitions for edge endpoints
// =============================================================

const ARROW_MARKERS = {
  none:    null,
  classic: { type: 'path', d: 'M 10 -5 0 0 10 5 Z' },
  block:   { type: 'path', d: 'M 10 -10 0 0 10 10 Z' }
};

// =============================================================
// Edge — a connection between two nodes
// =============================================================

class Edge extends EventBus {
  constructor(link, sourceNode, targetNode, editor) {
    super();
    this.link = link;
    this.sourceNode = sourceNode;
    this.targetNode = targetNode;
    this.editor = editor;
    this.pathPoints = [];
  }

  get id() {
    return this.link.id;
  }

  get source() {
    return this.sourceNode;
  }

  get target() {
    return this.targetNode;
  }

  // label

  get label() {
    return this.link.label(0)?.attrs?.text?.text || '';
  }

  set label(value) {
    this._applyLabel(value);
    this.emit('change', this);
  }

  get labelColor() {
    return this.link.label(0)?.attrs?.text?.fill || '#333333';
  }

  set labelColor(value) {
    this.link.prop('labelColor', value);
    this._applyLabel(this.label);
    this.emit('change', this);
  }

  get labelFontSize() {
    return this.link.get('fontSizePercent') || 100;
  }

  set labelFontSize(value) {
    this.link.set('fontSizePercent', value);
    this._applyLabel(this.label);
    this.emit('change', this);
  }

  // line appearance

  get lineColor() {
    return this.link.attr('line/stroke') || '#495057';
  }

  set lineColor(value) {
    this.link.attr('line/stroke', value);
    this.emit('change', this);
  }

  get lineWidth() {
    return this.link.attr('line/strokeWidth') || 2;
  }

  set lineWidth(value) {
    this.link.attr('line/strokeWidth', value);
    this.emit('change', this);
  }

  get lineStyle() {
    const dash = this.link.attr('line/strokeDasharray') || '';
    if (dash === '5,5') {
      return 'dashed';
    }
    if (dash === '1,5') {
      return 'dotted';
    }
    return 'solid';
  }

  set lineStyle(value) {
    if (value === 'dashed') {
      this.link.attr('line/strokeDasharray', '5,5');
    } else if (value === 'dotted') {
      this.link.attr('line/strokeDasharray', '1,5');
    } else {
      this.link.attr('line/strokeDasharray', '');
    }
    this.emit('change', this);
  }

  // arrows

  get sourceArrow() {
    return this._arrowNameFromDefinition(this.link.attr('line/sourceMarker'));
  }

  set sourceArrow(value) {
    this.link.attr('line/sourceMarker', ARROW_MARKERS[value] || null);
    this.emit('change', this);
  }

  get targetArrow() {
    return this._arrowNameFromDefinition(this.link.attr('line/targetMarker'));
  }

  set targetArrow(value) {
    this.link.attr('line/targetMarker', ARROW_MARKERS[value] || null);
    this.emit('change', this);
  }

  // connector routing

  get connectorType() {
    const connector = this.link.connector()?.name;
    const router = this.link.router()?.name;
    if (connector === 'smooth') {
      return 'curved';
    }
    if (router === 'normal') {
      return 'straight';
    }
    return 'elbow';
  }

  set connectorType(value) {
    const gridSize = this.editor.gridSize;
    if (value === 'elbow') {
      this.link.router('manhattan', { step: gridSize, padding: 20 });
      this.link.connector('rounded');
    } else if (value === 'straight') {
      this.link.router('normal');
      this.link.connector('normal');
    } else {
      this.link.router('normal');
      this.link.connector('smooth');
    }
    this.emit('change', this);
  }

  // port pinning

  get sourcePort() {
    return this.link.get('sourcePort') ?? null;
  }

  set sourcePort(value) {
    this._setPort('source', value);
  }

  get targetPort() {
    return this.link.get('targetPort') ?? null;
  }

  set targetPort(value) {
    this._setPort('target', value);
  }

  // description

  get description() {
    return this.link.get('description') || '';
  }

  set description(value) {
    this.link.set('description', value);
    this.emit('change', this);
  }

  // path points (bend points along the edge)

  getPathPoints() {
    return [...this.pathPoints];
  }

  addPathPoint(x, y) {
    const points = [...this.link.vertices(), { x, y }];
    this.link.vertices(points);

    const point = new PathPoint(this.link, points.length - 1);
    this.pathPoints.push(point);
    return point;
  }

  // actions

  select() {
    this.editor._selectItem(this);
    return this;
  }

  deselect() {
    this.editor.clearSelection();
    return this;
  }

  remove() {
    this.link.remove();
    this.emit('remove', this);
  }

  // internal helpers

  _applyLabel(text) {
    const fontSize = 12 * ((this.link.get('fontSizePercent') || 100) / 100);
    const color = this.link.get('labelColor') || '#333333';

    if (text) {
      this.link.labels([{
        attrs: {
          text: { text, fill: color, fontSize, textVerticalAnchor: 'middle' },
          rect: { fill: 'white', opacity: 0.9 }
        },
        position: { distance: 0.5 }
      }]);
    } else {
      this.link.labels([]);
    }
  }

  _arrowNameFromDefinition(definition) {
    if (!definition) {
      return 'none';
    }
    if (definition.d === ARROW_MARKERS.classic.d) {
      return 'classic';
    }
    if (definition.d === ARROW_MARKERS.block.d) {
      return 'block';
    }
    return 'none';
  }

  _setPort(side, portIndex) {
    const node = side === 'source' ? this.sourceNode : this.targetNode;
    this.link.set(`${side}Port`, portIndex);

    if (portIndex === null) {
      this.link[side]({ id: node.cell.id });
    } else {
      const port = node.cell.getPorts()[portIndex - 1];
      if (port) {
        this.link[side]({ id: node.cell.id, port: port.id });
      }
    }
    this.emit('change', this);
  }
}

// =============================================================
// Node — base class for a diagram shape
// =============================================================

class Node extends EventBus {
  constructor(options = {}) {
    super();
    this._label = typeof options === 'string' ? options : (options.label ?? '');
    this._initOptions = typeof options === 'string' ? {} : options;
    this.cell = null;
    this.editor = null;
    this.schema = {};
    this.customProps = {};
    this.renderFn = null;
  }

  // custom properties

  getCustomProperty(key) {
    return this.customProps[key];
  }

  setCustomProperty(key, value) {
    this.customProps[key] = value;
    this.cell?.set(`custom_${key}`, value);
    if (this.renderFn) {
      this.renderFn(this);
    }
    this.emit('change', this);
  }

  getSchema() {
    return this.schema;
  }

  // position and size

  get id() {
    return this.cell?.id ?? null;
  }

  get x() {
    return this.cell?.position().x ?? 0;
  }

  set x(value) {
    this.cell?.position(value, this.y);
    this.emit('change', this);
  }

  get y() {
    return this.cell?.position().y ?? 0;
  }

  set y(value) {
    this.cell?.position(this.x, value);
    this.emit('change', this);
  }

  get width() {
    return this.cell?.size().width ?? 0;
  }

  get height() {
    return this.cell?.size().height ?? 0;
  }

  get portCount() {
    return 4;
  }

  // label

  get label() {
    return this.cell?.attr('label/text') ?? this._label;
  }

  set label(value) {
    this.cell?.attr('label/text', value);
    this._label = value;
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get labelColor() {
    return this.cell?.attr('label/fill') ?? '#212529';
  }

  set labelColor(value) {
    this.cell?.attr('label/fill', value);
    this.emit('change', this);
  }

  get labelFontSize() {
    return this.cell?.get('fontSizePercent') ?? 100;
  }

  set labelFontSize(value) {
    this.cell?.set('fontSizePercent', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  // description

  get description() {
    return this.cell?.get('description') ?? '';
  }

  set description(value) {
    this.cell?.set('description', value);
    this.cell?.attr('descriptionLabel/text', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get descriptionColor() {
    return this.cell?.attr('descriptionLabel/fill') ?? '#6c757d';
  }

  set descriptionColor(value) {
    this.cell?.attr('descriptionLabel/fill', value);
    this.emit('change', this);
  }

  // appearance

  get backgroundColor() {
    return this.cell?.attr('body/fill') ?? '#ffffff';
  }

  set backgroundColor(value) {
    this.cell?.attr('body/fill', value);
    this.emit('change', this);
  }

  get borderColor() {
    return this.cell?.attr('body/stroke') ?? '#adb5bd';
  }

  set borderColor(value) {
    this.cell?.attr('body/stroke', value);
    this.emit('change', this);
  }

  get borderWidth() {
    return this.cell?.attr('body/strokeWidth') ?? 2;
  }

  set borderWidth(value) {
    this.cell?.attr('body/strokeWidth', value);
    this.emit('change', this);
  }

  // image

  get imageUrl() {
    return this.cell?.get('imageUrl') ?? '';
  }

  set imageUrl(value) {
    this.cell?.set('imageUrl', value);
    this.cell?.attr('image/xlink:href', value);
    this.cell?.attr('image/display', value ? 'block' : 'none');
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get imageWidth() {
    return this.cell?.get('imageWidth') ?? 32;
  }

  set imageWidth(value) {
    this.cell?.set('imageWidth', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get imageHeight() {
    return this.cell?.get('imageHeight') ?? 32;
  }

  set imageHeight(value) {
    this.cell?.set('imageHeight', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  // status and priority

  get status() {
    return this.cell?.get('status') ?? 'pending';
  }

  set status(value) {
    this.cell?.set('status', value);
    this.emit('change', this);
  }

  get priority() {
    return this.cell?.get('priority') ?? 1;
  }

  set priority(value) {
    this.cell?.set('priority', value);
    this.emit('change', this);
  }

  // movement

  moveTo(x, y) {
    this.cell?.position(x, y);
    this.emit('move', this);
    return this;
  }

  moveBy(deltaX, deltaY) {
    return this.moveTo(this.x + deltaX, this.y + deltaY);
  }

  toFront() {
    this.cell?.toFront();
    return this;
  }

  toBack() {
    this.cell?.toBack();
    return this;
  }

  // selection

  select() {
    this.editor?._selectItem(this);
    return this;
  }

  deselect() {
    this.editor?.clearSelection();
    return this;
  }

  // edges

  getEdges() {
    return this.editor?._getEdgesForNode(this) ?? [];
  }

  getIncomingEdges() {
    return this.getEdges().filter(edge => edge.target === this);
  }

  getOutgoingEdges() {
    return this.getEdges().filter(edge => edge.source === this);
  }

  connect(targetNode, sourcePortIndex = null, targetPortIndex = null) {
    if (targetNode === this) {
      throw new Error('A node cannot connect to itself.');
    }
    return this.editor?._createEdge(this, targetNode, sourcePortIndex, targetPortIndex);
  }

  // lifecycle

  remove() {
    this.cell?.remove();
    this.emit('remove', this);
  }

  _buildCell(position, jointNamespace) {
    throw new Error('_buildCell must be implemented by subclass');
  }

  _resizeToFitContent() {
    if (!this.editor || !this.cell) {
      return;
    }
    this.editor._fitNodeToContent(this.cell);
  }

  _getShapeType() {
    return 'rect';
  }
}

// =============================================================
// Node.define — factory that creates custom node classes
// =============================================================

Node.define = function(BaseNodeClass, defaultOptions = {}, schema = {}, renderFn = null) {
  class CustomNode extends BaseNodeClass {
    constructor(options = {}) {
      super();
      this.customProps = {};
      this.schema = schema;
      this.renderFn = renderFn;
      this._defaultOptions = defaultOptions;

      // merge default options with instance options
      const merged = { ...defaultOptions, ...options };

      // copy any built-in property overrides so addNode() can apply them later
      const builtIns = [
        'label', 'labelColor', 'labelFontSize',
        'description', 'descriptionColor',
        'backgroundColor', 'borderColor', 'borderWidth',
        'imageUrl', 'imageWidth', 'imageHeight',
        'status', 'priority'
      ];
      builtIns.forEach(key => {
        if (merged[key] !== undefined) {
          this[`_init_${key}`] = merged[key];
        }
      });
      this._label = merged.label ?? defaultOptions.label ?? '';

      // initialise custom property values from schema defaults
      Object.entries(schema).forEach(([key, fieldDefinition]) => {
        this.customProps[key] = options[key] !== undefined ? options[key] : fieldDefinition.default;
      });
    }

    getCustomProperty(key) {
      return this.customProps[key];
    }

    setCustomProperty(key, value) {
      if (!(key in this.schema)) {
        throw new Error(`Unknown custom property: ${key}`);
      }
      this.customProps[key] = value;
      this.cell?.set(`custom_${key}`, value);
      if (this.renderFn) {
        this.renderFn(this);
      }
      this.emit('change', this);
    }

    getSchema() {
      return this.schema;
    }

    _buildCell(position, jointNamespace) {
      return super._buildCell(position, jointNamespace);
    }
  }

  CustomNode.prototype._getShapeType = BaseNodeClass.prototype._getShapeType;
  Object.defineProperty(
    CustomNode.prototype,
    'portCount',
    Object.getOwnPropertyDescriptor(BaseNodeClass.prototype, 'portCount') || { get() { return 4; } }
  );
  return CustomNode;
};

// =============================================================
// Concrete node shape subclasses
// =============================================================

class Rectangle extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'rect';
  }

  _buildCell(position, namespace) {
    return _buildRectangleCell(position, namespace, 'rect', 140, 50);
  }
}

class Square extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'square';
  }

  _buildCell(position, namespace) {
    return _buildRectangleCell(position, namespace, 'square', 80, 80);
  }
}

class Ellipse extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'ellipse';
  }

  _buildCell(position, namespace) {
    return _buildEllipseCell(position, namespace, 'ellipse', 140, 50);
  }
}

class Circle extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'circle';
  }

  _buildCell(position, namespace) {

// =============================================================
// Shared JointJS cell construction helpers
// =============================================================

// markup shared by every node shape (image, label, description)
const SHARED_CELL_MARKUP = [
  { tagName: 'image', selector: 'image',            className: 'image' },
  { tagName: 'text',  selector: 'label',            className: 'label' },
  { tagName: 'text',  selector: 'descriptionLabel', className: 'descriptionLabel' }
];

// default visual attributes for those markup elements
const SHARED_CELL_ATTRS = {
  image:            { display: 'none' },
  label:            { fill: '#212529', fontSize: 13, fontWeight: 'bold', pointerEvents: 'none' },
  descriptionLabel: { text: '', fill: '#6c757d', fontSize: 11, pointerEvents: 'none' }
};

// default model properties stored on every cell
const SHARED_CELL_DEFAULTS = {
  description: '', status: 'pending', priority: 1,
  imageUrl: '', imageWidth: 32, imageHeight: 32, fontSizePercent: 100
};

function _attachPortsToCell(cell, polygonPoints) {
  // all ports share the same visual style
  cell.prop('ports/groups', {
    all: {
      position: 'absolute',
      attrs: {
        circle: { r: 6, fill: '#3498db', magnet: true, stroke: '#fff', strokeWidth: 2, pointerEvents: 'all' },
        text: { display: 'none' }
      }
    }
  });

  // for rectangles and ellipses, place ports at the four cardinal edges.
  // for polygons, place one port at the midpoint of each side.
  let ports;
  if (polygonPoints.length === 0) {
    ports = [
      { group: 'all', args: { x: '50%',  y: '0%',   dy: -1 } },
      { group: 'all', args: { x: '100%', y: '50%' } },
      { group: 'all', args: { x: '50%',  y: '100%', dy: 1 } },
      { group: 'all', args: { x: '0%',   y: '50%' } }
    ];
  } else {
    ports = polygonPoints.map((point, i) => {
      const next = polygonPoints[(i + 1) % polygonPoints.length];
      return {
        group: 'all',
        args: {
          x: `${((point[0] + next[0]) / 2 / 20) * 100}%`,
          y: `${((point[1] + next[1]) / 2 / 20) * 100}%`
        }
      };
    });
  }

  cell.addPorts(ports);
}

function _buildRectangleCell(position, namespace, shapeType, width, height) {
  const cell = new namespace.standard.Rectangle();
  cell.markup = [{ tagName: 'rect', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(width, height);
  cell.attr({ body: { fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2, rx: 5, ry: 5 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_DEFAULTS });
  _attachPortsToCell(cell, []);
  return cell;
}

function _buildEllipseCell(position, namespace, shapeType, width, height) {
  const cell = new namespace.standard.Ellipse();
  cell.markup = [{ tagName: 'ellipse', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(width, height);
  cell.attr({ body: { fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_DEFAULTS });
  _attachPortsToCell(cell, []);
  return cell;
}

function _buildPolygonCell(position, namespace, shapeType, width, height, points) {
  const cell = new namespace.standard.Polygon();
  cell.markup = [{ tagName: 'polygon', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(width, height);
  cell.attr({ body: { refPoints: points.map(p => p.join(',')).join(' '), fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_DEFAULTS });
  _attachPortsToCell(cell, points);
  return cell;
}

// =============================================================
// DiagramEditor — the main controller
// =============================================================

class DiagramEditor extends EventBus {
  constructor(container) {
    super();
    this.container = container;
    this.gridSize = 10;
    this.clearanceUnits = 4;
    this.nodeMap = new Map();    // jointCell.id → Node
    this.edgeMap = new Map();    // jointLink.id → Edge
    this.selection = null;
    this.autoPortsOn = true;
    this.isLoading = false;
    this.touchState = null;
    this.pointerDownAt = null;
    this.selectionWasAlreadyActive = false;
    this.registeredNodeTypes = {};

    this._buildLayout();
    this._setupRenderer();
    this._attachButtonListeners();
    this._attachDiagramListeners();
    this._attachTouchListeners();
    this._attachKeyboardShortcuts();

    // any mutation to the diagram bubbles up as a single 'change' event,
    // but only when we're not in the middle of a bulk deserialize
    ['node:add', 'node:remove', 'node:change', 'node:move', 'edge:add', 'edge:remove', 'edge:change']
      .forEach(event => {
        this.on(event, () => {
          if (!this.isLoading) {
            this.emit('change');
          }
        });
      });

    // collapse both sidebars by default on mobile to save space
    if (this._isMobile()) {
      this._setSidebarCollapsed(this.leftSidebar, true);
      this._setSidebarCollapsed(this.rightSidebar, true);
    }
  }

  /**
   * Public: register a custom node type in the shape library
   */
  registerNodeType(label, NodeClass) {
    const item = this.shapeLibrary.appendChild(this._makeElement('div', 'wf-node-template'));
    item.textContent = label;
    item.draggable = true;
    item.dataset.nodeTypeLabel = label;

    // on mobile, tapping a library item adds the node directly
    item.addEventListener('click', () => {
      if (!this._isMobile()) {
        return;
      }
      this.addNode(new NodeClass());
      if (!this.leftSidebar.classList.contains('wf-collapsed')) {
        this._toggleSidebar(this.leftSidebar);
      }
    });

    item.addEventListener('dragstart', event => event.dataTransfer.setData('customNode', label));
    this.registeredNodeTypes[label] = NodeClass;
  }

  /**
   * Public: add a node to the diagram
   */
  addNode(node, canvasX, canvasY) {
    const namespace = joint.shapes;
    const area = this.canvasArea;

    // default to the centre of the visible canvas area
    const centerX = canvasX ?? area.clientWidth  / 2;
    const centerY = canvasY ?? area.clientHeight / 2;

    // convert screen coordinates to diagram coordinates
    const localPosition = this.renderer.clientToLocalPoint({
      x: centerX + area.getBoundingClientRect().left,
      y: centerY + area.getBoundingClientRect().top
    });

    // squarish shapes (Square, Circle, Diamond) use equal dimensions
    const isSquarish = node instanceof Square || node instanceof Circle || node instanceof Diamond;
    const width = isSquarish ? 80 : 140;
    const height = isSquarish ? 80 : 50;

    // find a spot that doesn't overlap existing nodes
    const openPosition = this._findOpenPosition(
      localPosition.x - width / 2,
      localPosition.y - height / 2,
      width,
      height
    );

    // build the underlying JointJS cell and wire it to our Node object
    const cell = node._buildCell(openPosition, namespace);
    cell.attr('label/text', node._label);
    node.cell = cell;
    node.editor = this;

    // apply any built-in property overrides passed in via the constructor
    const builtIns = [
      'label', 'labelColor', 'labelFontSize',
      'description', 'descriptionColor',
      'backgroundColor', 'borderColor', 'borderWidth',
      'imageUrl', 'imageWidth', 'imageHeight',
      'status', 'priority'
    ];
    const initOptions = node._initOptions || {};
    builtIns.forEach(key => {
      const value = initOptions[key] ?? node[`_init_${key}`];
      if (value !== undefined) {
        node[key] = value;
      }
    });

    // persist custom property values onto the cell model
    Object.entries(node.customProps).forEach(([key, value]) => cell.set(`custom_${key}`, value));

    cell.addTo(this.graph);
    this.nodeMap.set(cell.id, node);
    this.clearSelection();

    // auto-resize and run the render function once the cell is in the DOM
    const ready = (async () => {
      await this._waitForRender(cell);
      await this._resizeNodeAsync(cell);

      if (node.renderFn) {
        node.renderFn(node);
      }

      await this._waitForRender(cell);

      node.on('change', changedNode => this.emit('node:change', changedNode));
      node.on('move', movedNode => this.emit('node:move', movedNode));

      return node;
    })();

    this.emit('node:add', node);
    return ready;
  }

  removeNode(node) {
    node.remove();
    this.nodeMap.delete(node.id);
    this.emit('node:remove', node);
  }

  getNodes() {
    return [...this.nodeMap.values()];
  }

  getEdges() {
    return [...this.edgeMap.values()];
  }

  // viewport controls

  panTo(x, y) {
    this.renderer.translate(x, y);
    return this;
  }

  centerContent() {
    const bbox = this.graph.getBBox();
    if (!bbox) {
      return this;
    }
    const size = this.renderer.getComputedSize();
    this.renderer.scale(1, 1);
    this.renderer.translate(
      size.width  / 2 - (bbox.x + bbox.width  / 2),
      size.height / 2 - (bbox.y + bbox.height / 2)
    );
    return this;
  }

  zoomIn(factor = 1.25) {
    this._zoomAtCenter(factor);
    return this;
  }

  zoomOut(factor = 0.8) {
    this._zoomAtCenter(factor);
    return this;
  }

  zoomReset() {
    this._zoomAtCenter(1 / this.renderer.scale().sx);
    return this;
  }

  zoomToFit() {
    this.renderer.scaleContentToFit({ padding: 50, minScale: 0.2, maxScale: 2 });
    return this;
  }

  getZoomLevel() {
    return this.renderer.scale().sx;
  }

  getSelectedItem() {
    return this.selection;
  }

  clearSelection() {
    this._deselectAll();
    return this;
  }

  setAutoPortSwitching(enabled) {
    this.autoPortsOn = enabled;
    this.autoPortToggleButton.classList.toggle('active', enabled);

    if (enabled) {
      this.graph.getElements().forEach(element => this._updateConnectionPorts(element));
    }
    return this;
  }

  autoArrange() {
    // build a dagre graph from the current nodes and edges
    const dagreGraph = new dagre.graphlib.Graph();
    dagreGraph.setGraph({ rankdir: 'TB', ranksep: 60, nodesep: 40, marginx: 40, marginy: 40 });
    dagreGraph.setDefaultEdgeLabel(() => ({}));

    this.graph.getElements().forEach(element => {
      const { width, height } = element.size();
      dagreGraph.setNode(element.id, { width, height });
    });

    this.graph.getLinks().forEach(link => {
      const source = link.getSourceElement();
      const target = link.getTargetElement();
      if (source && target) {
        dagreGraph.setEdge(source.id, target.id);
      }
    });

    // run the layout algorithm, then reposition each node
    dagre.layout(dagreGraph);

    this.graph.getElements().forEach(element => {
      const layoutNode = dagreGraph.node(element.id);
      if (!layoutNode) {
        return;
      }
      element.position(
        Math.round(layoutNode.x - layoutNode.width  / 2),
        Math.round(layoutNode.y - layoutNode.height / 2)
      );
    });

    if (this.autoPortsOn) {
      this.graph.getElements().forEach(element => this._updateConnectionPorts(element));
    }

    this.centerContent();
    return this;
  }

  /**
   * Public: serialize the diagram to a JSON string
   */
  serialize() {
    const nodes = [...this.nodeMap.values()].map(node => ({
      id: node.cell.id,
      nodeClass: node.constructor.name,
      x: node.x,
      y: node.y,
      props: {
        label:            node.label,
        labelColor:       node.labelColor,
        labelFontSize:    node.labelFontSize,
        description:      node.description,
        descriptionColor: node.descriptionColor,
        backgroundColor:  node.backgroundColor,
        borderColor:      node.borderColor,
        borderWidth:      node.borderWidth,
        imageUrl:         node.imageUrl,
        imageWidth:       node.imageWidth,
        imageHeight:      node.imageHeight,
      },
      customProps: { ...node.customProps },
    }));

    const edges = [...this.edgeMap.values()].map(edge => {
      // resolve a port object back to a 1-based index
      const resolvePort = (endpoint, node) => {
        const portId = endpoint?.port;
        if (!portId) {
          return null;
        }
        const index = node.cell.getPorts().findIndex(port => port.id === portId);
        return index >= 0 ? index + 1 : null;
      };

      return {
        sourceId:      edge.source.cell.id,
        targetId:      edge.target.cell.id,
        sourcePort:    resolvePort(edge.link.source(), edge.source),
        targetPort:    resolvePort(edge.link.target(), edge.target),
        label:         edge.label,
        labelColor:    edge.labelColor,
        labelFontSize: edge.labelFontSize,
        lineColor:     edge.lineColor,
        lineWidth:     edge.lineWidth,
        lineStyle:     edge.lineStyle,
        sourceArrow:   edge.sourceArrow,
        targetArrow:   edge.targetArrow,
        connectorType: edge.connectorType,
        description:   edge.description,
        vertices:      edge.link.vertices(),
      };
    });

    return JSON.stringify({ nodes, edges });
  }

  /**
   * Public: deserialize a JSON string and rebuild the diagram
   */
  async deserialize(json) {
    const { nodes: nodeDataList, edges: edgeDataList } = typeof json === 'string' ? JSON.parse(json) : json;
    if (!Array.isArray(nodeDataList)) {
      throw new Error('Invalid diagram file format.');
    }

    // clear the current diagram
    this._deselectAll();
    this.nodeMap.clear();
    this.edgeMap.clear();
    this.graph.clear();

    const nodeClassMap = {
      Rectangle, Square, Ellipse, Circle, Diamond, Triangle, Hexagon, Pentagon, Octagon,
      ...Object.fromEntries(Object.entries(this.registeredNodeTypes).map(([, cls]) => [cls.name, cls]))
    };

    // disable auto-ports and change events during the bulk load
    this.autoPortsOn = false;
    this.isLoading = true;

    // keep a map of old serialized IDs → new Node instances so edges can reconnect
    const oldIdToNode = {};

    for (const nodeData of nodeDataList) {
      const NodeClass = nodeClassMap[nodeData.nodeClass];
      if (!NodeClass) {
        console.warn(`Unknown node class: ${nodeData.nodeClass}`);
        continue;
      }

      // reconstruct the node and its cell
      const node = new NodeClass({ ...nodeData.props, ...nodeData.customProps });
      const cell = node._buildCell({ x: nodeData.x, y: nodeData.y }, joint.shapes);
      cell.attr('label/text', node._label);
      node.cell = cell;
      node.editor = this;

      // re-apply built-in property overrides
      const builtIns = [
        'label', 'labelColor', 'labelFontSize',
        'description', 'descriptionColor',
        'backgroundColor', 'borderColor', 'borderWidth',
        'imageUrl', 'imageWidth', 'imageHeight',
        'status', 'priority'
      ];
      const initOptions = node._initOptions || {};
      builtIns.forEach(key => {
        const value = initOptions[key] ?? node[`_init_${key}`];
        if (value !== undefined) {
          node[key] = value;
        }
      });

      Object.entries(node.customProps).forEach(([key, value]) => cell.set(`custom_${key}`, value));

      cell.addTo(this.graph);
      this.nodeMap.set(cell.id, node);

      // wait two frames so the DOM has rendered the cell before we measure it
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      this._fitNodeToContent(cell);
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      this.renderer.updateViews();

      if (node.renderFn) {
        node.renderFn(node);
      }

      node.on('change', changedNode => this.emit('node:change', changedNode));
      node.on('move', movedNode => this.emit('node:move', movedNode));

      oldIdToNode[nodeData.id] = node;
    }

    // reconnect edges using the old→new ID map
    for (const edgeData of edgeDataList) {
      const sourceNode = oldIdToNode[edgeData.sourceId];
      const targetNode = oldIdToNode[edgeData.targetId];
      if (!sourceNode || !targetNode) {
        continue;
      }

      const edge = sourceNode.connect(targetNode, edgeData.sourcePort, edgeData.targetPort);
      if (!edge) {
        continue;
      }

      if (edgeData.label)         { edge.label         = edgeData.label; }
      if (edgeData.labelColor)    { edge.labelColor    = edgeData.labelColor; }
      if (edgeData.labelFontSize) { edge.labelFontSize = edgeData.labelFontSize; }

      edge.lineColor     = edgeData.lineColor;
      edge.lineWidth     = edgeData.lineWidth;
      edge.lineStyle     = edgeData.lineStyle;
      edge.sourceArrow   = edgeData.sourceArrow;
      edge.targetArrow   = edgeData.targetArrow;
      edge.connectorType = edgeData.connectorType;

      if (edgeData.description)    { edge.description    = edgeData.description; }
      if (edgeData.vertices?.length) { edge.link.vertices(edgeData.vertices); }
    }

    this.isLoading = false;

    // force a full re-render, then restore pinned port indices
    const allCells = this.graph.getCells();
    this.graph.resetCells(allCells);
    await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

    this.graph.getLinks().forEach(link => {
      const edge = this.edgeMap.get(link.id);
      if (!edge) {
        return;
      }

      const savedEdge = edgeDataList.find(data =>
        oldIdToNode[data.sourceId]?.cell.id === edge.source.cell.id &&
        oldIdToNode[data.targetId]?.cell.id === edge.target.cell.id
      );
      if (!savedEdge) {
        return;
      }

      if (savedEdge.sourcePort != null) { link.set('sourcePort', savedEdge.sourcePort); }
      if (savedEdge.targetPort != null) { link.set('targetPort', savedEdge.targetPort); }
    });

    this.emit('change');
    return this;
  }

  /**
   * Internal: hide/show mobile floating buttons

  _updateMobileButtonVisibility() {
    if (!this._isMobile()) {

      { label: 'Ellipse',   type: 'ellipse',  cls: Ellipse   },

      { label: 'Hexagon',   type: 'hexagon',  cls: Hexagon   },
      { label: 'Pentagon',  type: 'pentagon', cls: Pentagon  },
      { label: 'Octagon',   type: 'octagon',  cls: Octagon   },

    builtInShapes.forEach(({ label, type, cls }) => {
      const item = this.shapeLibrary.appendChild(this._makeElement('div', 'wf-node-template'));

      item.addEventListener('dragstart', event => event.dataTransfer.setData('type', type));

        if (!this._isMobile()) {

        this.addNode(new cls(label.toUpperCase()));
        if (!this.leftSidebar.classList.contains('wf-collapsed')) {
          this._toggleSidebar(this.leftSidebar);
        }
      });
    });
  }
