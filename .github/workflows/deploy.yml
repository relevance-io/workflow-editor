name: Build & Deploy JS

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build lib
        run: npm run build:lib

      - name: Build app
        run: npm run build:app

      - name: Install Angular component dependencies
        working-directory: lib/angular/
        run: npm ci

      - name: Build Angular component
        run: npm run build:angular

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/develop'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    name: Publish to npm
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Check if current version is tagged
        id: check_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "version-exists=true" >> $GITHUB_OUTPUT
          else
            echo "version-exists=false" >> $GITHUB_OUTPUT
          fi

          VERSION_TAG=latest
          if \
            [[ "${VERSION}" =~ "alpha" ]] || \
            [[ "${VERSION}" =~ "beta" ]] || \
            [[ "${VERSION}" =~ "rc" ]];
          then
            VERSION_TAG=next
          fi

          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ steps.check_tag.outputs.version-exists }}" == "true" ]; then
            if [ "${{ steps.check_tag.outputs.version_tag }}" == "next" ]; then
              npm version prerelease --no-git-tag-version
            else
              npm version patch --no-git-tag-version
            fi
          fi

          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get commits since last tag
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" | head -20 | grep -v "^chore:" | grep -v "^Revert" | awk '!seen[$0]++' | sed 's/^/- /')
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version }}"
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" | grep -v "^chore:" | grep -v "^Revert" | awk '!seen[$0]++' | sed 's/^/- /')
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${{ steps.version.outputs.version }}"
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Update package.json
        run: cp -f package.json dist/

      - name: Publish to npm
        working-directory: dist/
        run: npm publish --access public --tag "${{ steps.check_tag.outputs.version_tag }}"

      - name: Commit version bump
        if: steps.check_tag.outputs.version-exists == 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push

      - name: Package dist for release
        working-directory: dist/
        run: zip -r ../workflow-editor-${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.check_tag.outputs.version_tag == 'next' }}
          files: workflow-editor-${{ steps.version.outputs.version }}.zip
          body: |
            ${{ steps.changelog.outputs.commits }}

            **Full changelog:** ${{ steps.changelog.outputs.compare_url }}
